<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Haiqa ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Georgia, serif;
    }

    body{
      background:#090909;
      color:#fff;
      overflow:hidden;
    }

   .screen{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:
      radial-gradient(circle at center,#3b0000 0%,#090909 70%);
}
      radial-gradient(circle at center,#3b0000 0%,#090909 70%);
    }

    h1{
      font-size:50px;
      color:#d4af37;
      margin-bottom:15px;
      opacity:0;
      animation:fadeIn 1.5s forwards;
    }

    p{
      font-size:20px;
      color:#ddd;
      opacity:0;
      animation:fadeIn 1.5s forwards;
      animation-delay:.8s;
    }

    button{
      margin-top:45px;
      padding:18px 42px;
      font-size:18px;
      border:none;
      border-radius:50px;
      cursor:pointer;
      background:#d4af37;
      color:black;
      font-weight:bold;
      opacity:0;
      animation:fadeIn 1.5s forwards;
      animation-delay:1.6s;
      transition:.3s;
    }

    button:hover{
      transform:scale(1.08);
      box-shadow:0 0 25px gold;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

<div id="intro" class="screen">
  <h1>hey haiqa.</h1>

  <p>we made something for u.</p>

  <button onclick="showBirthday()">CLICK HERE</button>
</div>
  <div id="birthday" class="screen" style="
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:radial-gradient(circle,#5a0b16 0%, #090909 70%);
">

<h1>HAPPY 14TH</h1>

<h1>BIRTHDAY</h1>

<h1>HAIQA!!!!</h1>

<p>this is only the beginning...</p>

</div>
<script>
function showBirthday(){

document.getElementById("intro").style.display="none";

document.getElementById("birthday").style.display="flex";

}
</script>
</body>
</html>
